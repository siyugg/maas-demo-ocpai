worker_processes auto;
error_log /dev/stderr;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    access_log    /dev/stdout;

    upstream backend {
        server backend.maas-demo.svc.cluster.local:8080;
    }

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to backend
        location ~ ^/(chat|weather|admin|health) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Required for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # Vite hashed assets can be cached forever
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html must never be cached so updated JS bundles are picked up
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # React SPA — all other paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
