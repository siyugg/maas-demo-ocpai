apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: maas-demo
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: default-route-openshift-image-registry.apps.ocp.kr6vb.sandbox2859.opentlc.com/maas-demo/mcp-server:latest
          ports:
            - containerPort: 8000
          # DATA_GOV_SG_API_KEY is optional — add a secret and env entry here if you need higher rate limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
