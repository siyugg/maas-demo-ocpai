apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: backend
  namespace: maas-demo
spec:
  runPolicy: SerialLatestOnly
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: backend:latest
  triggers:
    - type: ConfigChange
---
