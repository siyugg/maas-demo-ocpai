apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-8b
  namespace: maas-demo
  labels:
    app: granite-8b
    opendatahub.io/dashboard: "true"
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    serviceAccountName: maas-demo-sa
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: s3://your-bucket/granite-8b-instruct   # Replace with actual URI
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 24Gi
          nvidia.com/gpu: "1"
      env:
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: spawn
